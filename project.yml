name: HeuraiMoons
packages:
  SwiftAA:
    url: https://github.com/onekiloparsec/SwiftAA.git
    exactVersion: 3.0.0
options:
  bundleIdPrefix: com.heurai
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SDKROOT: macosx
    SUPPORTED_PLATFORMS: macosx
    DEVELOPMENT_TEAM: ""
targets:
  HeuraiMoons:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: Shared/Sources
      - path: App/Resources
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: "moons ∆ heurai"
        LSApplicationCategoryType: public.app-category.weather
        NSLocationWhenInUseUsageDescription: Heurai Moons uses your location to calculate local rise and set times for the Moon and planets.
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heurai.moons
        PRODUCT_NAME: "moons ∆ heurai"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SwiftAA
